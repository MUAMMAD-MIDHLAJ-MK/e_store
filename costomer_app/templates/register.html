{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <link rel="stylesheet" href="{% static 'css/regi.css' %}">
</head>
<body>

<div class="container">

    <h2>Registration</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn">
            Register
        </button>
    </form>

    <div class="logo-box">
        <a href="{% url 'product_app:product_list' %}">
    <img src="{% static 'image/novlog1.png' %}" alt="Logo" class="logo">
    
           
        </a>
    </div>

</div>

</body>
</html>
